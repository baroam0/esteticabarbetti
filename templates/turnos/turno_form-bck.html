{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container-fluid">
    <!-- Título dinámico -->
    <h1 class="h3 mb-4 text-gray-800">
        {% if form.instance.pk %}Editar Turno{% else %}Nuevo Turno{% endif %}
    </h1>

    <div class="row">
        <div class="col-lg-12">
            <div class="card shadow mb-4">
                <div class="card-header py-3">
                    <h6 class="m-0 font-weight-bold text-primary">
                        {% if form.instance.pk %}Modificar datos del turno{% else %}Completar datos del turno{% endif %}
                    </h6>
                </div>
                <div class="card-body">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}


                        {{form.as_p}}

                        <div class="form-group mt-4">
                            <button type="submit" class="btn btn-primary">
                                {% if form.instance.pk %}Guardar cambios{% else %}Crear turno{% endif %}
                            </button>
                            <a href="{% url 'turno_list' %}" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
