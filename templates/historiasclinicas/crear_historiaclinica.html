{% extends 'base.html' %}

{% block content %}

        <div class="card o-hidden border-0 shadow-lg my-5">
            <div class="card-body p-0">
                <!-- Nested Row within Card Body -->
                <div class="row">
                    
                    <div class="col-lg-12">
                        <div class="p-5">
                            <div class="text-center">
                                <h1 class="h4 text-gray-900 mb-4">{{accion}} Historia Clinica - {{paciente.nombre}}</h1>
                            </div>
                            <form method="POST" enctype="multipart/form-data"> {% csrf_token %}

                                <div class="form-group row">
                                    <label for="id_historia" class="col-auto col-form-label">Historia</label>
                                    <div class="col">
                                        {{ form.historia }}
                                    </div>
                                </div>

                                <div class="form-group row">
                                    <label for="id_diagnostico" class="col-auto col-form-label">Diagnostico</label>
                                    <div class="col">
                                        {{ form.diagnostico }}
                                    </div>
                                </div>

                                <div class="form-group row">
                                    <label for="id_tratamiento" class="col-auto col-form-label">Tratamiento</label>
                                    <div class="col">
                                        {{ form.tratamiento }}
                                    </div>
                                </div>

                                {{ form_imagenes.as_p }}


                                <div class="form-group row">
                                    <div class="col-sm-6 mb-3 mb-sm-0">
                                        <button type="submit" class="btn btn-primary btn-user btn-block">
                                            Guardar
                                        </button>
                                    </div>

                                    <div class="col-sm-6 mb-3 mb-sm-0">
                                        <button type="button" class="btn btn-info btn-user btn-block" onclick="Volver()">
                                            Cancelar
                                        </button>
                                    </div>
                                </div>
                                
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>


{%endblock%}


{% block js%}
<script>
    function Volver() {
        window.location.replace("/historiasclinicas/lista/" + "{{ historiaclinica.paciente.pk }}");
    }
</script>
{%endblock%}
