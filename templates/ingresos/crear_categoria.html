{% extends 'base.html' %}

{% block content %}

        <div class="card o-hidden border-0 shadow-lg my-5">
            <div class="card-body p-0">
                <!-- Nested Row within Card Body -->
                <div class="row">
                    
                    <div class="col-lg-12">
                        <div class="p-5">
                            <div class="text-center">
                                <h1 class="h4 text-gray-900 mb-4">{{accion}} Categoria</h1>
                            </div>
                            
                            {% if messages %}
                                <div class="alert alert-warning">
                                {% for message in messages %}
                                    {{ message }}
                                {% endfor %}
                                </div>
                            {% endif %}

                            <form method="POST"> {% csrf_token %}
                                <div class="form-group row">
                                    <div class="col-sm-12 mb-3 mb-sm-0">
                                        {{form.descripcion}}
                                    </div>
                                </div>

                                <div class="form-group row">
                                    <div class="col-sm-12 mb-3 mb-sm-0">
                                        <div>
                                            {{ form.habilitado }}
                                            <label for="id_habilitado">Habilitado para cosmiatras</label>
                                        </div>
                                    </div>
                                </div>

                                <div class="form-group row">
                                    <div class="col-sm-6 mb-3 mb-sm-0">
                                        <button type="submit" class="btn btn-primary btn-user btn-block">
                                            Guardar
                                        </button>
                                    </div>
                                    <div class="col-sm-6">
                                        <button type="submit" class="btn btn-secondary btn-user btn-block" onclick="Volver()"">
                                            Cancelar
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>    

        <script>
            function Volver() {
                window.location.replace("/ingresos/listarcategorias/");
            }
        </script>

{%endblock%}
