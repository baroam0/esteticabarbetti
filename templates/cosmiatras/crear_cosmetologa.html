{% extends 'base.html' %}

{% block content %}
        <div class="card o-hidden border-0 shadow-lg my-5">
            <div class="card-body p-0">
                <!-- Nested Row within Card Body -->
                <div class="row">
                    
                    <div class="col-lg-12">
                        <div class="p-5">
                            <div class="text-center">
                                <h1 class="h4 text-gray-900 mb-4">{{accion}} Cosmiatra</h1>
                            </div>
                            <form  method="POST"> {% csrf_token %}
                                <div class="form-group row">
                                    <div class="col-sm-12 mb-6 mb-sm-0">
                                        {{form.apellido}}
                                    </div>
                                </div>
                                <div class="form-group row">
                                    <div class="col-sm-12 mb-6 mb-sm-0">
                                        {{form.nombre}}    
                                    </div>
                                </div>

                                <div class="form-group row">
                                    <div class="col-sm-12 mb-6 mb-sm-0">
                                        {{form.telefono}}
                                    </div>
                                </div>

                                <div class="form-group row">
                                    <div class="col-sm-12 mb-6 mb-sm-0">
                                            {{form.domicilio}}
                                    </div>
                                </div>

                                

                                <div class="row mt-4">
                                    <div class="col-sm-6 mb-2">
                                        <button type="submit" class="btn btn-success btn-block">
                                            <i class="fas fa-save"></i> {{accion}}
                                        </button>
                                    </div>
                                    <div class="col-sm-6 mb-2">
                                        <button type="button" class="btn btn-secondary btn-block" onclick="Volver()">
                                            <i class="fas fa-times"></i> Cancelar
                                        </button>
                                    </div>
                                </div>

                      
                            </form>
                            
                        </div>
                    </div>
                </div>
            </div>
        </div>

{%endblock%}

{%block js%}

<script>
    function Volver() {
        window.location.replace("/cosmiatras/cosmetologa/lista");
    }


</script>

{%endblock%}
